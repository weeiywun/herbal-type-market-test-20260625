<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高雄市中藥商業同業公會｜工作人員監控台</title>
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/staff.css">
</head>
<body data-page="staff">
    <main class="staff-shell">
        <section class="staff-head paper-card">
            <div>
                <div class="eyebrow">工作人員監控台</div>
                <h1>市集互動遊戲作業頁</h1>
                <p>這一頁供工作人員查看進度、剩餘庫存與待領獎紀錄。後續接 Supabase 時，這個頁面可直接改成正式後台。</p>
            </div>
            <a class="button button-secondary" href="./index.html">開啟民眾頁</a>
        </section>

        <section class="metrics-grid">
            <article class="metric-card paper-card">
                <span>總參與</span>
                <strong id="metric-draws">0</strong>
            </article>
            <article class="metric-card paper-card">
                <span>已領獎</span>
                <strong id="metric-claimed">0</strong>
            </article>
            <article class="metric-card paper-card">
                <span>待覆核</span>
                <strong id="metric-pending">0</strong>
            </article>
            <article class="metric-card paper-card">
                <span>剩餘庫存</span>
                <strong id="metric-remaining">1000</strong>
            </article>
        </section>

        <section class="staff-layout">
            <div class="main-column">
                <article class="panel paper-card">
                    <div class="panel-head">
                        <div>
                            <div class="eyebrow">待領獎清單</div>
                            <h2>待工作人員覆核</h2>
                        </div>
                        <button class="button button-secondary" id="refresh-button" type="button">重新整理</button>
                    </div>
                    <div class="pending-list" id="pending-list"></div>
                </article>

                <article class="panel paper-card">
                    <div class="panel-head">
                        <div>
                            <div class="eyebrow">最近紀錄</div>
                            <h2>最近抽籤與領獎</h2>
                        </div>
                    </div>
                    <div class="record-list" id="record-list"></div>
                </article>
            </div>

            <aside class="side-column">
                <article class="panel paper-card">
                    <div class="panel-head">
                        <div>
                            <div class="eyebrow">五行庫存</div>
                            <h2>茶包發送狀態</h2>
                        </div>
                    </div>
                    <div class="inventory-list" id="inventory-list"></div>
                </article>

                <article class="panel paper-card">
                    <div class="panel-head">
                        <div>
                            <div class="eyebrow">領獎覆核</div>
                            <h2>輸入領獎碼</h2>
                        </div>
                    </div>
                    <div class="claim-form">
                        <label for="claim-code-input">領獎碼</label>
                        <input id="claim-code-input" type="text" placeholder="例如 KHM-0001-ABCD">
                        <label for="claim-pin-input">工作人員密碼</label>
                        <input id="claim-pin-input" type="password" inputmode="numeric" placeholder="請輸入工作人員密碼">
                        <button class="button button-primary" id="claim-button" type="button">確認領獎</button>
                        <p class="panel-note">
                            這一步目前會更新本地 mock 狀態。接 Supabase 之後，這裡會改成呼叫正式的領獎確認流程。
                        </p>
                    </div>
                </article>
            </aside>
        </section>
    </main>

    <div class="toast" id="toast"></div>

    <script src="./js/config.js"></script>
    <script src="./js/store.js"></script>
    <script src="./js/staff-app.js"></script>
</body>
</html>
